name: 'Vega Virtual Device Action'
description: >-
  Boots the Vega Virtual Device (VVD) — a QEMU-based emulator — inside the
  vega-virtual-device-host container and runs a script against it, capturing a
  screenshot. Analogous to reactivecircus/android-emulator-runner, but for Vega.
author: 'vegaos-cicd'
branding:
  icon: 'tv'
  color: 'orange'

inputs:
  script:
    description: 'Command(s) to run inside the container once the VVD is booted and ready. Has vega, vda, vvd-screenshot.sh on PATH; cwd is the mounted checkout (or working-directory).'
    required: true
  image:
    description: >-
      Optional. An existing vega-virtual-device-host image to run instead of
      building one. Leave empty (the default) to have the action build the image
      locally from its bundled Dockerfile and cache it via the GitHub Actions
      cache, like reactivecircus/android-emulator-runner does for the Android SDK.
      Set this only if you host your own image.
    required: false
    default: ''
  boot-timeout:
    description: 'Seconds to wait for the VVD to reach a ready (non-black) home screen before failing.'
    required: false
    default: '300'
  working-directory:
    description: 'Sub-directory of the checkout to cd into before running the script (and where screenshot-path is resolved).'
    required: false
    default: '.'
  pre-launch-script:
    description: 'Optional command(s) run inside the container BEFORE the VVD is started (e.g. extra setup or npm config).'
    required: false
    default: ''
  capture-screenshot:
    description: 'Capture a screenshot after the script runs (and on boot/run failure). true/false.'
    required: false
    default: 'true'
  screenshot-path:
    description: 'Where to write the screenshot, relative to working-directory.'
    required: false
    default: 'vvd-screenshot.png'
  pull:
    description: 'When `image` is set, docker pull it before running. true/false. Ignored when the action builds the image locally (image empty).'
    required: false
    default: 'true'
  container-options:
    description: 'Extra flags appended to the `docker run` command (advanced) — e.g. additional -v mounts or -e env.'
    required: false
    default: ''

outputs:
  screenshot:
    description: 'Path (relative to working-directory) to the captured screenshot, or empty if none was produced.'
    value: ${{ steps.run.outputs.screenshot }}
  boot-status:
    description: 'ready | timeout | failed.'
    value: ${{ steps.run.outputs.boot-status }}

runs:
  using: composite
  steps:
    # No image override → build the host image locally from the bundled
    # Dockerfile, cached via the GitHub Actions cache so only the first run pays
    # the full build. Mirrors how android-emulator-runner sets up the Android SDK
    # on the runner. The action repo (with Dockerfile, scripts/, .sdk-version)
    # lives at ${{ github.action_path }}/.. — independent of the consumer's own
    # checkout.
    - name: Set up Docker Buildx
      if: ${{ inputs.image == '' }}
      uses: docker/setup-buildx-action@v3

    - name: Build vega-virtual-device-host image
      if: ${{ inputs.image == '' }}
      uses: docker/build-push-action@v6
      with:
        context: ${{ github.action_path }}/..
        file: ${{ github.action_path }}/../Dockerfile
        platforms: linux/amd64
        load: true
        tags: vega-virtual-device-host:local
        cache-from: type=gha,scope=vega-vvd-host
        cache-to: type=gha,mode=max,scope=vega-vvd-host

    # Only an explicit image override may need pulling; the locally-built image
    # is already loaded into the daemon.
    - name: Pull vega-virtual-device-host image
      if: ${{ inputs.image != '' && inputs.pull != 'false' }}
      shell: bash
      run: docker pull "${{ inputs.image }}"

    - name: Boot VVD and run script
      id: run
      shell: bash
      env:
        VVD_IMAGE: ${{ inputs.image != '' && inputs.image || 'vega-virtual-device-host:local' }}
        VVD_SCRIPT: ${{ inputs.script }}
        VVD_PRE_LAUNCH: ${{ inputs.pre-launch-script }}
        VVD_BOOT_TIMEOUT: ${{ inputs.boot-timeout }}
        VVD_WORKDIR: ${{ inputs.working-directory }}
        VVD_CAPTURE: ${{ inputs.capture-screenshot }}
        VVD_SHOT_PATH: ${{ inputs.screenshot-path }}
        VVD_CONTAINER_OPTS: ${{ inputs.container-options }}
      run: "${{ github.action_path }}/run.sh"
