name: VVD Appium navigation screenshots

# Boots the VVD via vega-virtual-device-action on a free GitHub-hosted runner and
# navigates the pre-installed Kepler Video App with **Appium** (WebdriverIO + the
# Vega "kepler" driver) — browse → carousels → details → player → settings —
# screenshotting each step with Appium's own takeScreenshot(). It exercises the
# official Appium-on-Vega path end-to-end (install Appium + kepler driver, start
# the server, create a session, inject D-pad keys) on the headless software-GL
# (Mesa llvmpipe) VVD.
#
# Like vvd-action-test.yml this builds the host image here (PR-only) with the same
# layer cache; on push to main / tags docker-publish.yml builds and publishes it.
on:
  pull_request:
    branches: [main]
    paths:
      - 'vega-virtual-device-action/**'
      - 'scripts/**'
      - 'examples/appium-navigation-test.sh'
      - 'examples/appium/**'
      - 'Dockerfile'
      - '.sdk-version'
      - '.github/actions/setup-vvd-host/**'
      - '.github/actions/pr-screenshot-comment/**'
      - '.github/workflows/vvd-appium-test.yml'
  workflow_dispatch:
    inputs:
      appium-version:
        description: 'Appium server version (blank = pinned default)'
        required: false
        default: ''
      kepler-driver-version:
        description: 'Vega kepler Appium driver version (blank = pinned default)'
        required: false
        default: ''
      screenshot-policy:
        description: 'warn (black screenshots reported) or require (black fails the job)'
        required: false
        default: 'warn'

# Workflow-level sources: a dispatch input overrides each; pull_request runs (no
# inputs) fall back to the pinned defaults. Versions per the Appium-for-Vega docs.
env:
  APPIUM_VERSION: ${{ github.event.inputs.appium-version || '2.2.2' }}
  KEPLER_DRIVER_VERSION: ${{ github.event.inputs.kepler-driver-version || '3.30.0' }}
  SCREENSHOT_POLICY: ${{ github.event.inputs.screenshot-policy || 'warn' }}
  # A stock VVD has no pre-installed user apps, so CI installs the Kepler Video App
  # from a prebuilt vpkg hosted as a release asset on this repo (same fixture as
  # the Argent navigation test). Re-upload to that release to bump.
  KEPLERVIDEOAPP_RELEASE: fixtures-keplervideoapp-0.22.1
  KEPLERVIDEOAPP_VPKG: keplervideoapp_aarch64.vpkg
  APP_ID: com.amazondeveloper.keplervideoapp.main

jobs:
  vvd-appium:
    name: Boot VVD, navigate app with Appium, screenshot each step
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    # contents: write — the screenshot-comment step commits the PNGs to a dedicated
    #   ci-screenshots branch (so they can be embedded inline).
    # pull-requests: write — to post/update the screenshot comment on the PR.
    # packages: read — to RESTORE the registry build cache written by docker-publish.yml.
    permissions:
      contents: write
      pull-requests: write
      packages: read
    steps:
      - uses: actions/checkout@v4

      # Free disk, enable KVM, set up Buildx, log in to GHCR, and build
      # vega-virtual-device-host:ci (shared registry build cache). See
      # .github/actions/setup-vvd-host. (Needs the job's packages: read above.)
      - name: Set up VVD host
        uses: ./.github/actions/setup-vvd-host

      # Fetch the prebuilt app vpkg onto the runner (gh is available here, not in
      # the action container). It lands under the checkout, which the action mounts
      # at /workspace, so the script installs it via $VPKG.
      - name: Download Kepler Video App vpkg (test fixture)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p fixtures
          gh release download "$KEPLERVIDEOAPP_RELEASE" \
            -R "${{ github.repository }}" \
            -p "$KEPLERVIDEOAPP_VPKG" \
            -D fixtures --clobber
          ls -lh fixtures/

      # One build, one boot: the action boots the VVD, then the script installs the
      # Kepler Video App, starts Appium and navigates it with WebdriverIO,
      # screenshotting each step. It exits non-zero if Appium can't drive the app
      # (and, when SCREENSHOT_POLICY=require, if a required screen is black).
      - name: Boot VVD; navigate Kepler Video App with Appium; screenshot each step
        id: vvd
        uses: ./vega-virtual-device-action
        with:
          image: vega-virtual-device-host:ci
          pull: false
          boot-timeout: 420
          screenshot-path: artifacts/appium-final.png
          container-options: >-
            -e VPKG=fixtures/${{ env.KEPLERVIDEOAPP_VPKG }}
            -e APP_ID=${{ env.APP_ID }}
            -e APPIUM_VERSION=${{ env.APPIUM_VERSION }}
            -e KEPLER_DRIVER_VERSION=${{ env.KEPLER_DRIVER_VERSION }}
            -e SCREENSHOT_POLICY=${{ env.SCREENSHOT_POLICY }}
          script: |
            set -ex
            bash examples/appium-navigation-test.sh

      - name: Show outputs
        if: always()
        run: |
          echo "boot-status=${{ steps.vvd.outputs.boot-status }}"
          echo "screenshot=${{ steps.vvd.outputs.screenshot }}"

      # The script writes its Markdown table to artifacts/summary.md ($GITHUB_STEP_SUMMARY
      # is not visible inside the action's container), so surface it in the job summary here.
      - name: Publish navigation summary
        if: always()
        run: |
          if [ -f artifacts/summary.md ]; then
            cat artifacts/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No navigation summary produced (the script may have failed before reporting)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vvd-appium-screenshots
          path: artifacts/
          if-no-files-found: warn

      # Post every navigation screenshot as a single inline PR comment via the
      # shared local action (.github/actions/pr-screenshot-comment). Runs even on
      # failure so black/missing frames are visible; continue-on-error so a
      # commenting hiccup (e.g. a fork PR's read-only token) can't fail the run.
      - name: Comment PR with Appium navigation screenshots
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: ./.github/actions/pr-screenshot-comment
        with:
          github-token: ${{ github.token }}
          marker: vvd-appium-screenshots
          title: VVD Appium navigation screenshots
          intro: "Pre-installed Kepler Video App navigated on the VVD with Appium (WebdriverIO + kepler driver) at commit `${{ github.event.pull_request.head.sha }}`. Boot status: `${{ steps.vvd.outputs.boot-status }}`. Screenshots captured via Appium's `takeScreenshot()` under software GL (llvmpipe)."
          images: artifacts/[0-9][0-9]-*.png
          summary-file: artifacts/summary.md
