name: Build and publish Vega SDK Docker images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
    # Only rebuild the images on a PR when something image-relevant changes —
    # not on README/docs-only PRs. (scripts/ is COPY'd into the full image.)
    paths:
      - 'Dockerfile'
      - 'Dockerfile.build-only'
      - 'docker-bake.hcl'
      - '.dockerignore'
      - '.sdk-version'
      - 'scripts/**'
      - '.github/workflows/docker-publish.yml'

env:
  REGISTRY: ghcr.io
  # Full image = QEMU device host (SDK + VVD + GL stack); build = SDK only, no emulator.
  IMAGE_HOST: ghcr.io/${{ github.repository_owner }}/vega-virtual-device-host
  IMAGE_BUILDER: ghcr.io/${{ github.repository_owner }}/vega-sdk-builder
  # The SDK version is centralized in .sdk-version (read into a step output below).

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read SDK version
        id: sdk
        run: echo "version=$(cat .sdk-version)" >> "$GITHUB_OUTPUT"

      # Log in on every event. push/tag publishes the images AND writes the
      # registry build cache; PRs need read access to RESTORE that cache below
      # (cache-from). On a fork PR the read-only token may not see a private
      # cache — buildx then just treats it as a miss and rebuilds, so login
      # staying enabled here is harmless.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Generate tags/labels for each image separately, writing bake file
      # overrides that docker/bake-action merges with docker-bake.hcl.
      - name: Metadata — full image
        id: meta-full
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_HOST }}
          bake-target: _meta-full
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=sdk-${{ steps.sdk.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Metadata — build-only image
        id: meta-build-only
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BUILDER }}
          bake-target: _meta-build-only
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=sdk-${{ steps.sdk.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}

      # The Vega SDK installer sometimes transiently fails to download the VVM CLI
      # binary (S3 returns a non-gzip XML error page instead of the tarball).
      # The Dockerfiles already retry 3× internally; this job-level retry gives
      # the server 3 more minutes to recover before we try the full build again.
      # GHA layer cache means the retry only re-runs the failing SDK-install layer.
      - name: Build and push
        id: build
        uses: docker/bake-action@v6
        continue-on-error: true
        with:
          # On PRs, build ONLY the build-only image here. The host/full image is
          # built and smoke-tested by vvd-action-test.yml on PRs, so building it
          # here too would be a redundant second build of the same image. On
          # push/tag this publisher is the sole builder and builds both (default).
          targets: ${{ github.event_name == 'pull_request' && 'build-only' || 'default' }}
          files: |
            ./docker-bake.hcl
            cwd://${{ steps.meta-full.outputs.bake-file }}
            cwd://${{ steps.meta-build-only.outputs.bake-file }}
          push: ${{ github.event_name != 'pull_request' }}
          # Persistent registry build cache (GHCR), one ref per image. Unlike
          # type=gha (10GB repo cap + LRU eviction + branch-scoped), a registry
          # cache is never evicted and is readable from every branch/PR, so the
          # expensive Vega SDK layer (get_vvm.sh) is restored from cache on
          # virtually every build instead of being re-downloaded from the flaky
          # installer. cache-to runs only on push/tag — PRs lack registry write
          # auth and must not clobber the shared cache; cache-from is read by
          # everyone, including vvd-action-test.yml / vega-app-build.yml.
          #
          # KEEP IN SYNC: this set: block is duplicated verbatim in the retry
          # step below ("Build and push (retry)") — update both together.
          set: |
            full.cache-from=type=registry,ref=${{ env.IMAGE_HOST }}:buildcache
            build-only.cache-from=type=registry,ref=${{ env.IMAGE_BUILDER }}:buildcache
            ${{ github.event_name != 'pull_request' && format('full.cache-to=type=registry,ref={0}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true', env.IMAGE_HOST) || '' }}
            ${{ github.event_name != 'pull_request' && format('build-only.cache-to=type=registry,ref={0}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true', env.IMAGE_BUILDER) || '' }}

      - name: Wait for SDK server to recover
        if: steps.build.outcome == 'failure'
        run: |
          echo "First build failed — waiting 3 minutes before retry (SDK installer server flakiness)..."
          sleep 180

      - name: Build and push (retry)
        if: steps.build.outcome == 'failure'
        uses: docker/bake-action@v6
        with:
          targets: ${{ github.event_name == 'pull_request' && 'build-only' || 'default' }}
          files: |
            ./docker-bake.hcl
            cwd://${{ steps.meta-full.outputs.bake-file }}
            cwd://${{ steps.meta-build-only.outputs.bake-file }}
          push: ${{ github.event_name != 'pull_request' }}
          # KEEP IN SYNC with the "Build and push" step above (same set: block).
          set: |
            full.cache-from=type=registry,ref=${{ env.IMAGE_HOST }}:buildcache
            build-only.cache-from=type=registry,ref=${{ env.IMAGE_BUILDER }}:buildcache
            ${{ github.event_name != 'pull_request' && format('full.cache-to=type=registry,ref={0}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true', env.IMAGE_HOST) || '' }}
            ${{ github.event_name != 'pull_request' && format('build-only.cache-to=type=registry,ref={0}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true', env.IMAGE_BUILDER) || '' }}
