name: Build and publish Vega SDK Docker images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
    # Only rebuild the images on a PR when something image-relevant changes —
    # not on README/docs-only PRs. (scripts/ is COPY'd into the full image.)
    paths:
      - 'Dockerfile'
      - 'Dockerfile.build-only'
      - 'docker-bake.hcl'
      - '.dockerignore'
      - '.sdk-version'
      - 'scripts/**'
      - '.github/workflows/docker-publish.yml'

env:
  REGISTRY: ghcr.io
  # Full image = QEMU device host (SDK + VVD + GL stack); build = SDK only, no emulator.
  IMAGE_HOST: ghcr.io/${{ github.repository_owner }}/vega-virtual-device-host
  IMAGE_BUILDER: ghcr.io/${{ github.repository_owner }}/vega-sdk-builder
  # The SDK version is centralized in .sdk-version (read into a step output below).

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read SDK version
        id: sdk
        run: echo "version=$(cat .sdk-version)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Generate tags/labels for each image separately, writing bake file
      # overrides that docker/bake-action merges with docker-bake.hcl.
      - name: Metadata — full image
        id: meta-full
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_HOST }}
          bake-target: _meta-full
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=sdk-${{ steps.sdk.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Metadata — build-only image
        id: meta-build-only
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BUILDER }}
          bake-target: _meta-build-only
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=sdk-${{ steps.sdk.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}

      # The Vega SDK installer sometimes transiently fails to download the VVM CLI
      # binary (S3 returns a non-gzip XML error page instead of the tarball).
      # The Dockerfiles already retry 3× internally; this job-level retry gives
      # the server 3 more minutes to recover before we try the full build again.
      # GHA layer cache means the retry only re-runs the failing SDK-install layer.
      - name: Build and push
        id: build
        uses: docker/bake-action@v6
        continue-on-error: true
        with:
          # On PRs, build ONLY the build-only image here. The host/full image is
          # built and smoke-tested by vvd-action-test.yml on PRs, so building it
          # here too would be a redundant second build of the same image. On
          # push/tag this publisher is the sole builder and builds both (default).
          targets: ${{ github.event_name == 'pull_request' && 'build-only' || 'default' }}
          files: |
            ./docker-bake.hcl
            cwd://${{ steps.meta-full.outputs.bake-file }}
            cwd://${{ steps.meta-build-only.outputs.bake-file }}
          push: ${{ github.event_name != 'pull_request' }}
          # Per-target cache scopes (not a shared `*` scope) so the two images
          # don't overwrite each other's GHA cache manifest, and so the host
          # image's layers are shareable with vvd-action-test.yml (scope=host).
          set: |
            full.cache-from=type=gha,scope=host
            full.cache-to=type=gha,mode=max,scope=host
            build-only.cache-from=type=gha,scope=builder
            build-only.cache-to=type=gha,mode=max,scope=builder

      - name: Wait for SDK server to recover
        if: steps.build.outcome == 'failure'
        run: |
          echo "First build failed — waiting 3 minutes before retry (SDK installer server flakiness)..."
          sleep 180

      - name: Build and push (retry)
        if: steps.build.outcome == 'failure'
        uses: docker/bake-action@v6
        with:
          targets: ${{ github.event_name == 'pull_request' && 'build-only' || 'default' }}
          files: |
            ./docker-bake.hcl
            cwd://${{ steps.meta-full.outputs.bake-file }}
            cwd://${{ steps.meta-build-only.outputs.bake-file }}
          push: ${{ github.event_name != 'pull_request' }}
          set: |
            full.cache-from=type=gha,scope=host
            full.cache-to=type=gha,mode=max,scope=host
            build-only.cache-from=type=gha,scope=builder
            build-only.cache-to=type=gha,mode=max,scope=builder
