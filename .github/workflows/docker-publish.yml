name: Build and publish vega-virtual-device-host (thin wrapper)

# Publishes the THIN wrapper `vega-virtual-device-host` image: just
# `FROM ${BASE_IMAGE}` + /scripts/. The heavy `vega-virtual-device-host-base`
# (which contains the Vega SDK + VVD) is built by docker-base-publish.yml.
#
# Because there's no SDK install here, builds are fast and reliable: a fresh
# runner only needs to pull the base image's layers (CDN-backed GHCR, not the
# flaky sdk-installer.vega.labcollab.net), and warm GHA cache makes them a
# layer-cache hit. PRs and docs-only changes never re-run get_vvm.sh.
on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
    # Rebuild on a PR only when something wrapper-relevant changes (scripts/
    # is COPY'd into the image). SDK-version / base-Dockerfile changes are
    # handled by docker-base-publish.yml.
    paths:
      - 'Dockerfile'
      - 'docker-bake.hcl'
      - '.dockerignore'
      - 'scripts/**'
      - '.sdk-version'
      - '.github/workflows/docker-publish.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_HOST: ghcr.io/${{ github.repository_owner }}/vega-virtual-device-host
  IMAGE_HOST_BASE: ghcr.io/${{ github.repository_owner }}/vega-virtual-device-host-base

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read SDK version
        id: sdk
        run: echo "version=$(cat .sdk-version)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Metadata — host (wrapper) image
        id: meta-host
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_HOST }}
          bake-target: _meta-host
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=sdk-${{ steps.sdk.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}

      # Thin wrapper build: FROM the SDK-version-pinned base + COPY /scripts/.
      # No SDK install runs here, so the retry-and-sleep dance that used to live
      # in this workflow moved to docker-base-publish.yml. A failure here is a
      # real failure (e.g. broken Dockerfile / missing base tag).
      - name: Build and push (wrapper)
        uses: docker/bake-action@v6
        with:
          targets: host
          files: |
            ./docker-bake.hcl
            cwd://${{ steps.meta-host.outputs.bake-file }}
          push: ${{ github.event_name != 'pull_request' }}
          # cache-from registry seeds layers from the published wrapper :latest
          # when the GHA cache is cold (fresh runner, post-eviction).
          set: |
            host.args.BASE_IMAGE=${{ env.IMAGE_HOST_BASE }}:sdk-${{ steps.sdk.outputs.version }}
            host.cache-from=type=gha,scope=host
            host.cache-from=type=registry,ref=${{ env.IMAGE_HOST }}:latest
            host.cache-to=type=gha,mode=max,scope=host
