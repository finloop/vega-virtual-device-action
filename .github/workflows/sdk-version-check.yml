name: SDK version single-source check

# Guards the invariant that the Vega SDK version lives only in .sdk-version.
# Fails the build if a hardcoded version literal is reintroduced elsewhere.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: No hardcoded SDK version
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Check single source of truth
        run: tools/check-sdk-version.sh
