name: VVD navigation screenshots

# Boots the VVD via vega-virtual-device-action on a free GitHub-hosted runner and
# navigates the pre-installed Kepler Video App with Argent — browse → carousels →
# details → player → settings — capturing a screenshot at every step. Because the
# VVD renders on Mesa llvmpipe (CPU), the run of non-black frames is a software-GL
# rendering smoke test across focus changes and full screen transitions.
#
# Like vvd-action-test.yml this builds the host image here (PR-only) with the same
# layer cache — the same way the action builds it on a consumer's runner, so it
# does not depend on any published image.
on:
  pull_request:
    branches: [main]
    paths:
      - 'vega-virtual-device-action/**'
      - 'scripts/**'
      - 'examples/argent-navigation-test.sh'
      - 'examples/lib/**'
      - 'Dockerfile'
      - '.sdk-version'
      - '.github/workflows/vvd-navigation-test.yml'
      - '.github/actions/pr-screenshot-comment/**'
  workflow_dispatch:
    inputs:
      argent-tarball:
        description: 'Argent release tarball URL to test (blank = pinned default below)'
        required: false
        default: ''

# Single workflow-level source of the Argent tarball URL: a dispatch input
# overrides it; pull_request runs (no inputs) fall back to this default.
env:
  ARGENT_TARBALL: ${{ github.event.inputs.argent-tarball || 'https://github.com/finloop/argent/releases/download/v0.10.2-vega/swmansion-argent-0.10.2-vega.tgz' }}
  # A stock VVD has no pre-installed user apps, so CI installs the Kepler Video App
  # from a prebuilt vpkg hosted as a release asset on this repo (building it from
  # source needs Java + a full Shaka Player build). Re-upload to that release to bump.
  KEPLERVIDEOAPP_RELEASE: fixtures-keplervideoapp-0.22.1
  KEPLERVIDEOAPP_VPKG: keplervideoapp_aarch64.vpkg

jobs:
  vvd-navigate:
    name: Boot VVD, navigate app, screenshot each step
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    # contents: write — the screenshot-comment step commits the PNGs to a dedicated
    #   ci-screenshots branch (so they can be embedded inline).
    # pull-requests: write — to post/update the screenshot comment on the PR.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the host image locally so the test is self-contained and does not
      # depend on any published image — the same way the action builds it on a
      # consumer's runner. GitHub Actions cache (scope shared with the action and
      # the other workflows) reuses the expensive apt + Vega SDK layers across runs.
      - name: Build vega-virtual-device-host image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          load: true
          tags: vega-virtual-device-host:ci
          cache-from: type=gha,scope=vega-vvd-host
          cache-to: type=gha,mode=max,scope=vega-vvd-host

      # Fetch the prebuilt app vpkg onto the runner (gh is available here, not in the
      # action container). It lands under the checkout, which the action mounts at
      # /workspace, so the script installs it via $VPKG.
      - name: Download Kepler Video App vpkg (test fixture)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p fixtures
          gh release download "$KEPLERVIDEOAPP_RELEASE" \
            -R "${{ github.repository }}" \
            -p "$KEPLERVIDEOAPP_VPKG" \
            -D fixtures --clobber
          ls -lh fixtures/

      # One build, one boot: the action boots the VVD, then the script installs the
      # Kepler Video App (from $VPKG), launches it and walks it with Argent,
      # screenshotting each step. It exits non-zero if any required UI screen is black.
      - name: Boot VVD; navigate Kepler Video App; screenshot each step
        id: vvd
        uses: ./vega-virtual-device-action
        with:
          image: vega-virtual-device-host:ci
          pull: false
          boot-timeout: 420
          screenshot-path: artifacts/vvd-nav-final.png
          container-options: -e ARGENT_TARBALL=${{ env.ARGENT_TARBALL }} -e VPKG=fixtures/${{ env.KEPLERVIDEOAPP_VPKG }}
          script: |
            set -ex
            bash examples/argent-navigation-test.sh

      - name: Show outputs
        if: always()
        run: |
          echo "boot-status=${{ steps.vvd.outputs.boot-status }}"
          echo "screenshot=${{ steps.vvd.outputs.screenshot }}"

      # The script writes its Markdown table to artifacts/summary.md ($GITHUB_STEP_SUMMARY
      # is not visible inside the action's container), so surface it in the job summary here.
      - name: Publish navigation summary
        if: always()
        run: |
          if [ -f artifacts/summary.md ]; then
            cat artifacts/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No navigation summary produced (the script may have failed before reporting)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vvd-navigation-screenshots
          path: artifacts/
          if-no-files-found: warn

      # Post every navigation screenshot as a single inline PR comment via the
      # shared local action (.github/actions/pr-screenshot-comment). Runs even on
      # failure so black/missing frames are visible; continue-on-error so a
      # commenting hiccup (e.g. a fork PR's read-only token) can't fail the run.
      - name: Comment PR with navigation screenshots
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: ./.github/actions/pr-screenshot-comment
        with:
          github-token: ${{ github.token }}
          marker: vvd-navigation-screenshots
          title: VVD navigation screenshots
          intro: "Pre-installed Kepler Video App navigated on the VVD (commit `${{ github.event.pull_request.head.sha }}`). Boot status: `${{ steps.vvd.outputs.boot-status }}`. Software-GL (llvmpipe) render check — each frame must be non-black."
          images: artifacts/[0-9][0-9]-*.png
          summary-file: artifacts/summary.md
