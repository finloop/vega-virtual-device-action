name: Test Argent screenshot (Vega)

# Boots the VVD via vega-virtual-device-action, then runs Argent's (Vega variant)
# screenshot tool against it and uploads the captured home screen. Validates that
# the Argent Vega screenshot path works against the QEMU device in CI.

on:
  push:
    branches: [main]
    paths:
      - 'examples/argent-screenshot-test.sh'
      - 'vega-virtual-device-action/**'
      - 'scripts/**'
      - 'Dockerfile'
      - '.github/workflows/argent-screenshot-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'examples/argent-screenshot-test.sh'
      - 'vega-virtual-device-action/**'
      - 'scripts/**'
      - 'Dockerfile'
      - '.github/workflows/argent-screenshot-test.yml'
  workflow_dispatch:
    inputs:
      argent-tarball:
        description: 'Argent release tarball URL to test'
        required: false
        default: 'https://github.com/finloop/argent/releases/download/v0.10.2-vega/swmansion-argent-0.10.2-vega.tgz'

env:
  ARGENT_TARBALL: ${{ github.event.inputs.argent-tarball || 'https://github.com/finloop/argent/releases/download/v0.10.2-vega/swmansion-argent-0.10.2-vega.tgz' }}

jobs:
  argent-screenshot:
    name: Argent Vega screenshot
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Build the host image locally so the test is self-contained (does not
      # depend on the GHCR package already existing / being public).
      - name: Build vega-virtual-device-host image
        run: docker build --platform=linux/amd64 -t vega-virtual-device-host:ci -f Dockerfile .

      - name: Boot VVD and run Argent screenshot
        id: vvd
        uses: ./vega-virtual-device-action
        with:
          image: vega-virtual-device-host:ci
          pull: false
          boot-timeout: 420
          capture-screenshot: false      # Argent captures; not the action's own path
          container-options: -e ARGENT_TARBALL=${{ env.ARGENT_TARBALL }}
          script: bash examples/argent-screenshot-test.sh

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: argent-vega-screenshot
          path: artifacts/
          if-no-files-found: warn
