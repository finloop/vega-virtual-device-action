name: Build sample Vega app

# Builds and runs the sample Vega app end-to-end on a free GitHub-hosted runner:
# builds the host image, enables KVM, boots the VVD via vega-virtual-device-action,
# and in that single boot scaffolds an app from the hello-world template, builds the
# RELEASE vpkg, installs + launches it on the VVD, and screenshots the running app.
#
# Runs on PRs only (plus manual dispatch): like vvd-action-test.yml this builds the
# host image locally so it is self-contained. On push to main / tags the image is
# built and published by docker-publish.yml.
on:
  pull_request:
    branches: [main]
    paths:
      - 'vega-virtual-device-action/**'
      - 'scripts/**'
      - 'examples/build-sample-vega-app.sh'
      - 'Dockerfile'
      - '.github/workflows/vega-app-build.yml'
  workflow_dispatch:
    inputs:
      template:
        description: 'Vega app template to scaffold from (see `vega project list-templates`)'
        required: false
        default: 'helloWorld'

jobs:
  build-sample-app:
    name: Scaffold, build release, run, screenshot
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    # contents: write — the screenshot-comment action commits the PNG to its
    #   own branch (webpage-screenshot-action-branch).
    # pull-requests: write — to post the screenshot comment on the PR.
    # packages: read — to RESTORE the registry build cache (the Vega SDK layer).
    permissions:
      contents: write
      pull-requests: write
      packages: read
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Read access to the GHCR registry build cache restored in the build below.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the host image locally (self-contained, like vvd-action-test.yml).
      # The expensive apt + Vega SDK (get_vvm.sh) layers are restored from the
      # persistent registry cache docker-publish.yml writes on push to main —
      # never LRU-evicted and readable from any PR (unlike type=gha), so the flaky
      # installer is not re-run unless the PR changes apt/node/.sdk-version.
      - name: Build vega-virtual-device-host image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          load: true
          tags: vega-virtual-device-host:ci
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/vega-virtual-device-host:buildcache

      # One build, one boot: scaffold from the template, build the RELEASE vpkg,
      # install + launch on the VVD; the action captures the screenshot afterwards.
      - name: Boot VVD; build + run sample app; screenshot
        id: vvd
        uses: ./vega-virtual-device-action
        with:
          image: vega-virtual-device-host:ci
          pull: false
          boot-timeout: 420
          screenshot-path: artifacts/vega-app.png
          container-options: -e TEMPLATE=${{ github.event.inputs.template || 'helloWorld' }}
          script: |
            set -ex
            bash examples/build-sample-vega-app.sh

      - name: Show outputs
        if: always()
        run: |
          echo "boot-status=${{ steps.vvd.outputs.boot-status }}"
          echo "screenshot=${{ steps.vvd.outputs.screenshot }}"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vega-app-screenshot
          path: artifacts/
          if-no-files-found: warn

      # Post the screenshot as an inline PR comment. We host the PNG on a
      # dedicated `ci-screenshots` branch via the Contents API (pure API calls —
      # no local git, so no container "dubious ownership" issues) and embed it
      # with a github.com/.../raw/<branch>/<path> URL. That URL renders inline
      # for authorized viewers of THIS private repo; a raw.githubusercontent.com
      # URL would not (GitHub's image proxy can't authenticate to private
      # content). The comment is updated in place on re-runs via a hidden marker.
      # continue-on-error so a commenting hiccup (e.g. a fork PR's read-only
      # token) can't fail the build/run check itself.
      - name: Comment PR with screenshot
        if: always() && github.event_name == 'pull_request' && steps.vvd.outputs.screenshot != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
          SHA: ${{ github.event.pull_request.head.sha }}
          SHOT: artifacts/vega-app.png
          SHOT_BRANCH: ci-screenshots
        run: |
          set -euo pipefail
          MARKER='<!-- vega-sample-app-screenshot -->'

          # 1. Ensure the screenshots branch exists (created from the PR base).
          if ! gh api "repos/$REPO/branches/$SHOT_BRANCH" >/dev/null 2>&1; then
            base_sha=$(gh api "repos/$REPO/git/refs/heads/$BASE_REF" --jq '.object.sha')
            gh api "repos/$REPO/git/refs" -f ref="refs/heads/$SHOT_BRANCH" -f sha="$base_sha" >/dev/null
          fi

          # 2. Upload the PNG (unique path per run, so no existing-blob SHA needed).
          #    The base64 is ~1MB — too long for a CLI arg (128KB single-arg
          #    limit), so build the JSON body in a file and pass it via --input.
          dest="screenshots/pr-${PR}/vega-app-${GITHUB_RUN_ID}.png"
          base64 -w0 "$SHOT" > "$RUNNER_TEMP/shot.b64"
          jq -n \
            --arg message "CI: Vega sample app screenshot for PR #${PR} (${SHA})" \
            --arg branch "$SHOT_BRANCH" \
            --rawfile content "$RUNNER_TEMP/shot.b64" \
            '{message: $message, branch: $branch, content: $content}' > "$RUNNER_TEMP/put.json"
          gh api -X PUT "repos/$REPO/contents/$dest" --input "$RUNNER_TEMP/put.json" >/dev/null
          url="https://github.com/$REPO/raw/$SHOT_BRANCH/$dest"

          # 3. Create or update the PR comment (dedup via the hidden marker).
          body=$(printf '%s\n### Vega sample app screenshot\n\nBuilt from the `helloWorld` template and run on the VVD (commit `%s`).\n\n![Vega sample app](%s)\n' "$MARKER" "$SHA" "$url")
          cid=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
                  --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -n1 || true)
          if [ -n "$cid" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$cid" -f body="$body" >/dev/null
            echo "Updated comment $cid -> $url"
          else
            gh api "repos/$REPO/issues/$PR/comments" -f body="$body" >/dev/null
            echo "Created comment -> $url"
          fi
