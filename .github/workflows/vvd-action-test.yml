name: Test vega-virtual-device-action

# Exercises vega-virtual-device-action end-to-end on a free GitHub-hosted runner:
# builds the host image ONCE, enables KVM, boots the VVD via the action, and in a
# single boot runs both (a) the action's own checks + screenshot and (b) Argent's
# Vega screenshot tool, uploading both screenshots.
#
# Runs on PRs only (plus manual dispatch): this is the sole place the host image
# is built on a PR. On push to main / tags the host image is built and published
# by docker-publish.yml, so re-building it here would just duplicate that work.
on:
  pull_request:
    branches: [main]
    paths:
      - 'vega-virtual-device-action/**'
      - 'scripts/**'
      - 'examples/argent-screenshot-test.sh'
      - 'Dockerfile'
      - '.sdk-version'
      - '.github/workflows/vvd-action-test.yml'
  workflow_dispatch:
    inputs:
      argent-tarball:
        description: 'Argent release tarball URL to test (blank = pinned default below)'
        required: false
        default: ''

# Single workflow-level source of the Argent tarball URL: a dispatch input
# overrides it; pull_request runs (no inputs) fall back to this default.
env:
  ARGENT_TARBALL: ${{ github.event.inputs.argent-tarball || 'https://github.com/finloop/argent/releases/download/v0.10.2-vega/swmansion-argent-0.10.2-vega.tgz' }}

jobs:
  vvd-smoke:
    name: Boot VVD, screenshot, Argent
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    # packages: read — to RESTORE the registry build cache written by
    # docker-publish.yml (the expensive Vega SDK layer); see the build step.
    permissions:
      contents: read
      packages: read
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Read access to the GHCR registry build cache restored in the build below.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the host image locally so the smoke test exercises THIS PR's
      # Dockerfile/scripts changes (it can't just pull the published image).
      #
      # The expensive layers — apt install + the Vega SDK download (get_vvm.sh) —
      # are restored from the persistent registry cache that docker-publish.yml
      # writes on push to main. Unlike type=gha (10GB cap + LRU eviction +
      # branch-scoped), a registry cache is never evicted and is readable from
      # any PR, so a PR that doesn't touch apt/node/.sdk-version never re-runs the
      # flaky installer. Read-only: PRs must not write the shared cache (only the
      # cheap top layers — COPY scripts, verify — would differ here anyway).
      - name: Build vega-virtual-device-host image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          load: true
          tags: vega-virtual-device-host:ci
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/vega-virtual-device-host:buildcache

      # One build, one boot: the action's script runs the VVD checks and then the
      # Argent Vega screenshot test; the action also captures its own screenshot.
      - name: Boot VVD; run checks + Argent screenshot
        id: vvd
        uses: ./vega-virtual-device-action
        with:
          image: vega-virtual-device-host:ci
          pull: false
          boot-timeout: 420
          screenshot-path: artifacts/vvd-ready.png
          container-options: -e ARGENT_TARBALL=${{ env.ARGENT_TARBALL }}
          script: |
            set -ex
            vega exec vda devices
            vega exec vda shell "id"
            bash examples/argent-screenshot-test.sh

      - name: Show outputs
        if: always()
        run: |
          echo "boot-status=${{ steps.vvd.outputs.boot-status }}"
          echo "screenshot=${{ steps.vvd.outputs.screenshot }}"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vvd-screenshots
          path: artifacts/
          if-no-files-found: warn
